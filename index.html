  }
  nav.scrolled { background: var(--fons); border-color: var(--grisClar); }
  .nav-id { font-family: var(--fontCos); font-size: var(--midaNav); letter-spacing: .08em; color: var(--gris); }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    font-family: var(--fontTitols); font-weight: var(--pesNegreta);
    font-size: var(--midaNav); letter-spacing: .12em; text-transform: uppercase;
    color: var(--text); text-decoration: none; transition: color .2s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* HERO */
  .hero {
    min-height: 100vh; display: grid; grid-template-rows: 1fr auto;
    padding: var(--heroPadding);
    background: var(--fons);
  }
  .hero.amb-fons {
    background-size: cover; background-position: center;
    background-blend-mode: multiply;
  }
  .hero-content { display: flex; flex-direction: column; justify-content: center; max-width: 900px; }
  .hero-ref {
    font-family: var(--fontCos); font-size: var(--midaNav); color: var(--accent);
    letter-spacing: .15em; margin-bottom: 48px;
    opacity: 0; animation: fadeUp .8s .2s forwards;
  }
  .hero-title {
    font-family: var(--fontTitols); font-size: var(--midaHero);
    font-weight: var(--pesNegreta); line-height: .95; letter-spacing: -.03em;
    margin-bottom: 40px; opacity: 0; animation: fadeUp .9s .4s forwards;
  }
  .hero-title em {
    font-style: normal; font-family: var(--fontCos); font-size: .38em;
    display: block; color: var(--gris); letter-spacing: .1em; margin-top: 12px; line-height: 1.4;
  }
  .hero-abstract {
    max-width: 520px; font-size: var(--midaSubtitol); line-height: 1.75;
    opacity: 0; animation: fadeUp .9s .6s forwards;
    border-left: 1px solid var(--accent); padding-left: 24px;
  }
  .hero-bottom {
    display: flex; justify-content: space-between; align-items: flex-end;
    opacity: 0; animation: fadeUp .8s .9s forwards;
  }
  .hero-keywords { font-family: var(--fontCos); font-size: var(--midaEtiqueta); color: var(--gris); letter-spacing: .1em; display: flex; gap: 24px; }
  .hero-keywords span { border: 1px solid var(--grisClar); padding: 4px 10px; }
  .scroll-hint { font-family: var(--fontCos); font-size: var(--midaEtiqueta); color: var(--gris); writing-mode: vertical-rl; letter-spacing: .15em; }

  /* TICKER */
  .ticker { border-top: 1px solid var(--grisClar); border-bottom: 1px solid var(--grisClar); overflow: hidden; white-space: nowrap; padding: 12px 0; }
  .ticker-inner { display: inline-flex; gap: 60px; animation: ticker 28s linear infinite; }
  .ticker-inner span { font-family: var(--fontCos); font-size: var(--midaEtiqueta); letter-spacing: .12em; color: var(--gris); text-transform: uppercase; }
  .ticker-inner span.ac { color: var(--accent); }

  /* SECCIONS */
  section { padding: var(--seccio); }
  .section-label {
    font-family: var(--fontCos); font-size: var(--midaEtiqueta); letter-spacing: .2em;
    color: var(--accent); text-transform: uppercase; margin-bottom: 60px;
    display: flex; align-items: center; gap: 16px;
  }
  .section-label::after { content: ''; height: 1px; width: 60px; background: var(--grisClar); }

  /* INTRO */
  .intro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
  .intro-heading { font-family: var(--fontTitols); font-size: var(--midaH2); font-weight: var(--pesNegreta); line-height: 1.1; letter-spacing: -.02em; }
  .intro-text { font-size: var(--midaSubtitol); line-height: 1.8; }
  .intro-text p + p { margin-top: 20px; }
  .intro-text blockquote {
    font-family: var(--fontCos); font-style: italic; font-size: var(--midaCita);
    color: var(--gris); border-left: 2px solid var(--accent);
    padding: 16px 20px; margin: 28px 0; line-height: 1.7;
  }
  .intro-img { width: 100%; max-height: 420px; object-fit: cover; display: block; }

  /* MARC TEÒRIC */
  .theory-section { background: var(--fonsFosc); color: var(--fons); }
  .theory-section .section-label { color: var(--accent); }
  .theory-section .section-label::after { background: #333; }
  .theory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 40px; }
  .theory-card { background: var(--targetes); padding: var(--targeta); transition: background .2s; cursor: default; }
  .theory-card:hover { background: var(--targeteHover); }
  .theory-card-num { font-family: var(--fontCos); font-size: var(--midaEtiqueta); color: var(--accent); letter-spacing: .15em; margin-bottom: 20px; }
  .theory-card-title { font-family: var(--fontTitols); font-size: var(--midaTargeta); font-weight: var(--pesNegreta); margin-bottom: 16px; line-height: 1.3; }
  .theory-card-author { font-family: var(--fontCos); font-size: var(--midaEtiqueta); color: var(--gris); letter-spacing: .1em; margin-bottom: 20px; }
  .theory-card-text { font-size: 13px; color: var(--textFosc); line-height: 1.7; }
  .panoptic-quote { border-top: 1px solid #222; border-bottom: 1px solid #222; padding: 60px 0; margin-top: 60px; text-align: center; }
  .panoptic-quote p { font-family: var(--fontCos); font-style: italic; font-size: 13px; color: var(--gris); letter-spacing: .08em; line-height: 2; max-width: 700px; margin: 0 auto 12px; }
  .panoptic-quote cite { font-size: var(--midaEtiqueta); color: var(--accent); letter-spacing: .2em; text-transform: uppercase; }

  /* PROCÉS */
  .process-steps { display: grid; grid-template-columns: 1fr 2fr; gap: 80px; margin-top: 20px; }
  .process-nav { position: sticky; top: 120px; height: fit-content; }
  .process-step-link { display: block; font-family: var(--fontCos); font-size: 11px; letter-spacing: .1em; color: var(--gris); text-decoration: none; padding: 10px 0; border-bottom: 1px solid var(--grisClar); transition: color .2s, padding-left .2s; }
  .process-step-link:hover, .process-step-link.active { color: var(--text); padding-left: 12px; }
  .process-entries { display: flex; flex-direction: column; gap: 60px; }
  .process-entry { opacity: 0; transform: translateY(20px); transition: opacity .6s, transform .6s; }
  .process-entry.visible { opacity: 1; transform: translateY(0); }
  .process-entry-header { display: flex; align-items: baseline; gap: 20px; margin-bottom: 20px; }
  .process-entry-num { font-family: var(--fontCos); font-size: var(--midaEtiqueta); color: var(--accent); letter-spacing: .15em; }
  .process-entry-title { font-family: var(--fontTitols); font-size: var(--midaH3); font-weight: var(--pesNegreta); letter-spacing: -.01em; }
  .process-entry-body { font-size: var(--midaBase); line-height: 1.85; max-width: 560px; }
  .process-entry-body p + p { margin-top: 16px; }
  .screenshots-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 3px; margin-top: 40px; }
  .screenshot-item { position: relative; overflow: hidden; background: #111; aspect-ratio: 16/10; }
  .screenshot-item img { width: 100%; height: 100%; object-fit: cover; display: block; filter: grayscale(30%); transition: filter .4s, transform .4s; }
  .screenshot-item:hover img { filter: grayscale(0%); transform: scale(1.03); }
  .screenshot-label { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,.7)); padding: 20px 16px 12px; font-family: var(--fontCos); font-size: 9px; color: rgba(255,255,255,.6); letter-spacing: .12em; text-transform: uppercase; }

  /* OBRA FINAL */
  .obra-section { background: var(--fonsFosc); color: var(--fons); }
  .obra-section .section-label { color: var(--accent); }
  .obra-section .section-label::after { background: #333; }
  .obra-intro { max-width: 640px; font-size: 16px; line-height: 1.8; color: var(--textFosc); margin-bottom: 80px; }
  .informes-header { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; margin-bottom: 1px; }
  .informes-header div { font-family: var(--fontCos); font-size: 9px; color: var(--gris); letter-spacing: .15em; text-transform: uppercase; padding: 8px 16px; background: var(--targetes); }
  .informes-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; }
  .informe-card { background: var(--targetes); padding: 28px 24px; cursor: pointer; transition: background .25s; position: relative; overflow: hidden; }
  .informe-card:hover { background: var(--targeteHover); }
  .informe-card-ref { font-family: var(--fontCos); font-size: 9px; color: var(--accent); letter-spacing: .15em; margin-bottom: 12px; }
  .informe-card-id { font-family: var(--fontTitols); font-size: 28px; font-weight: var(--pesNegreta); letter-spacing: -.03em; margin-bottom: 8px; line-height: 1; }
  .informe-card-sub { font-family: var(--fontCos); font-size: 9px; color: var(--gris); margin-bottom: 16px; letter-spacing: .05em; }
  .informe-card-excerpt { font-size: var(--midaInforme); color: #666; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .informe-card-arrow { position: absolute; bottom: 20px; right: 20px; font-size: 18px; color: #333; transition: color .2s, transform .2s; }
  .informe-card:hover .informe-card-arrow { color: var(--accent); transform: translate(3px,-3px); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 1000; align-items: center; justify-content: center; padding: 40px; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #0f0f0f; border: 1px solid #222; max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative; padding: 48px; animation: fadeIn .25s ease; }
  .modal-close { position: sticky; top: 0; float: right; background: none; border: none; color: var(--gris); font-size: 22px; cursor: pointer; font-family: var(--fontCos); margin-bottom: 20px; transition: color .2s; }
  .modal-close:hover { color: white; }
  .modal-ref { font-family: var(--fontCos); font-size: 9px; color: var(--accent); letter-spacing: .2em; margin-bottom: 6px; }
  .modal-meta { font-family: var(--fontCos); font-size: 9px; color: var(--gris); letter-spacing: .12em; margin-bottom: 4px; }
  .modal-title { font-family: var(--fontTitols); font-size: 32px; font-weight: var(--pesNegreta); letter-spacing: -.02em; color: white; margin-bottom: 6px; margin-top: 20px; line-height: 1; }
  .modal-subtitle { font-family: var(--fontCos); font-size: var(--midaEtiqueta); color: #555; margin-bottom: 24px; letter-spacing: .08em; }
  .modal-imatge { width: 100%; max-height: 280px; object-fit: cover; display: block; margin-bottom: 28px; filter: grayscale(20%); }
  .modal-body { font-size: 13px; line-height: 1.9; color: var(--textFosc); border-top: 1px solid #1f1f1f; padding-top: 28px; }
  .modal-body strong { display: block; font-family: var(--fontCos); font-size: 9px; color: var(--gris); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 12px; margin-top: 24px; font-weight: normal; }
  .modal-box::-webkit-scrollbar { width: 4px; }
  .modal-box::-webkit-scrollbar-track { background: #111; }
  .modal-box::-webkit-scrollbar-thumb { background: #333; }

  /* REFERENTS */
  .referents-list { margin-top: 20px; }
  .referent-item { border-top: 1px solid var(--grisClar); padding: 28px 0; display: grid; grid-template-columns: 80px 1fr 1fr; gap: 40px; align-items: start; cursor: default; transition: padding-left .2s; }
  .referent-item:hover { padding-left: 16px; }
  .referent-item:last-child { border-bottom: 1px solid var(--grisClar); }
  .referent-num { font-family: var(--fontCos); font-size: var(--midaEtiqueta); color: var(--gris); letter-spacing: .12em; }
  .referent-name { font-family: var(--fontTitols); font-size: 16px; font-weight: var(--pesNegreta); margin-bottom: 4px; }
  .referent-work { font-family: var(--fontCos); font-size: 11px; color: var(--gris); letter-spacing: .06em; }
  .referent-desc { font-size: 13px; line-height: 1.7; }

  /* CONCLUSIONS */
  .conclusions-section { border-top: 1px solid var(--grisClar); }
  .conclusions-section.amb-fons { background-size: cover; background-position: center; }
  .conclusions-body { max-width: 680px; margin: 0 auto; text-align: center; }
  .conclusions-body p { font-family: var(--fontTitols); font-size: var(--midaConclusions); font-weight: var(--pesNegreta); line-height: 1.6; letter-spacing: -.01em; margin-bottom: 24px; }
  .conclusions-body em { font-family: var(--fontCos); font-style: normal; font-size: var(--midaEtiqueta); color: var(--gris); letter-spacing: .1em; display: block; margin-top: 40px; }

  /* FOOTER */
  footer { border-top: 1px solid var(--grisClar); padding: var(--nav); display: flex; justify-content: space-between; align-items: center; }
  footer p { font-family: var(--fontCos); font-size: var(--midaEtiqueta); color: var(--gris); letter-spacing: .1em; }

  /* ANIMACIONS */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: none; } }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes fadeIn { from { opacity: 0; transform: scale(.97); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<nav id="nav"></nav>
<section class="hero" id="hero">
  <div class="hero-content"></div>
  <div class="hero-bottom"></div>
</section>
<div class="ticker"><div class="ticker-inner" id="ticker-inner"></div></div>
<section id="intro"></section>
<section id="marc" class="theory-section"></section>
<section id="proces"></section>
<section id="obra" class="obra-section"></section>
<section id="referents" class="referents-section"></section>
<section id="conclusions" class="conclusions-section"></section>
<footer id="footer"></footer>
<div id="modals"></div>

<script>
/* ── Aplicar variables CSS a partir de CONFIG ── */
const C = CONFIG;
const root = document.documentElement;

// Colors
Object.entries(C.colors).forEach(([k, v]) => root.style.setProperty(`--${k}`, v));

// Tipografia
root.style.setProperty('--fontTitols',    C.tipografia.fontTitols);
root.style.setProperty('--fontCos',       C.tipografia.fontCos);
root.style.setProperty('--midaBase',      C.tipografia.midaBase);
root.style.setProperty('--midaNav',       C.tipografia.midaNav);
root.style.setProperty('--midaHero',      C.tipografia.midaHero);
root.style.setProperty('--midaSubtitol',  C.tipografia.midaSubtitol);
root.style.setProperty('--midaH2',        C.tipografia.midaH2);
root.style.setProperty('--midaH3',        C.tipografia.midaH3);
root.style.setProperty('--midaTargeta',   C.tipografia.midaTargeta);
root.style.setProperty('--midaConclusions', C.tipografia.midaConclusions);
root.style.setProperty('--midaEtiqueta',  C.tipografia.midaEtiqueta);
root.style.setProperty('--midaCita',      C.tipografia.midaCita);
root.style.setProperty('--midaInforme',   C.tipografia.midaInforme);
root.style.setProperty('--pesNormal',     C.tipografia.pesNormal);
root.style.setProperty('--pesNegreta',    C.tipografia.pesNegreta);

// Espaiat
root.style.setProperty('--seccio',        C.espaiat.seccio);
root.style.setProperty('--nav',           C.espaiat.nav);
root.style.setProperty('--targeta',       C.espaiat.targeta);
root.style.setProperty('--heroPadding',   C.espaiat.heroPadding);

/* ── NAV ── */
document.getElementById('nav').innerHTML = `
  <span class="nav-id">${C.nav.id}</span>
  <ul class="nav-links">
    ${C.nav.links.map(l => `<li><a href="${l.href}">${l.text}</a></li>`).join('')}
  </ul>`;

/* ── HERO ── */
const hero = document.getElementById('hero');
if (C.imatges.heroFons) {
  hero.classList.add('amb-fons');
  hero.style.backgroundImage = `url('${C.imatges.heroFons}')`;
}
document.querySelector('.hero-content').innerHTML = `
  <div class="hero-ref">${C.hero.ref}</div>
  <h1 class="hero-title">
    ${C.hero.titol.replace(/\n/g,'<br>')}
    <em>${C.hero.subtitol}</em>
  </h1>
  <p class="hero-abstract">${C.hero.abstract}</p>`;
document.querySelector('.hero-bottom').innerHTML = `
  <div class="hero-keywords">
    ${C.hero.keywords.map(k => `<span>${k}</span>`).join('')}
  </div>
  <div class="scroll-hint">${C.hero.scrollHint}</div>`;

/* ── TICKER ── */
const tItems = C.ticker.map(t => `<span class="${t.accent?'ac':''}">${t.text}</span>`).join('');
const tickerEl = document.getElementById('ticker-inner');
tickerEl.innerHTML = tItems + tItems;

/* ── INTRO ── */
const introImg = C.imatges.introImatge
  ? `<img src="${C.imatges.introImatge}" class="intro-img" alt="Imatge introducció">`
  : '';
document.getElementById('intro').innerHTML = `
  <div class="section-label">${C.intro.label}</div>
  <div class="intro-grid">
    <div><h2 class="intro-heading">${C.intro.titol}</h2>
    ${introImg}</div>
    <div class="intro-text">
      <p>${C.intro.p1}</p>
      <blockquote>${C.intro.cita}</blockquote>
      <p>${C.intro.p2}</p>
    </div>
  </div>`;

/* ── MARC TEÒRIC ── */
document.getElementById('marc').innerHTML = `
  <div class="section-label">${C.marc.label}</div>
  <div class="theory-grid">
    ${C.marc.conceptes.map(con => `
      <div class="theory-card">
        <div class="theory-card-num">${con.num}</div>
        <div class="theory-card-title">${con.titol}</div>
        <div class="theory-card-author">${con.autor}</div>
        <div class="theory-card-text">${con.text}</div>
      </div>`).join('')}
  </div>
  <div class="panoptic-quote">
    <p>${C.marc.cita}</p>
    <cite>${C.marc.citaAutor}</cite>
  </div>`;

/* ── PROCÉS ── */
const navLinks = C.proces.passos.map((p, i) =>
  `<a href="#${p.id}" class="process-step-link${i===0?' active':''}">${p.num} · ${p.titol}</a>`
).join('');

const capturesHTML = C.imatges.captures.length ? `
  <div class="screenshots-grid">
    ${C.imatges.captures.map(c => `
      <div class="screenshot-item">
        <img src="${c.src}" alt="${c.label}"
          onerror="this.parentElement.style.background='#1a1a1a';this.style.display='none'">
        <div class="screenshot-label">${c.label}</div>
      </div>`).join('')}
  </div>` : '';

const entries = C.proces.passos.map(p => {
  const html = `
    <div class="process-entry" id="${p.id}">
      <div class="process-entry-header">
        <span class="process-entry-num">${p.num}</span>
        <h3 class="process-entry-title">${p.titol}</h3>
      </div>
      <div class="process-entry-body">
        <p>${p.p1}</p>
        ${p.p2 ? `<p>${p.p2}</p>` : ''}
      </div>
    </div>`;
  return p.id === 'step2' ? html + capturesHTML : html;
}).join('');

document.getElementById('proces').innerHTML = `
  <div class="section-label">${C.proces.label}</div>
  <div class="process-steps">
    <nav class="process-nav">${navLinks}</nav>
    <div class="process-entries">${entries}</div>
  </div>`;

/* ── OBRA FINAL ── */
const informesHTML = C.obra.informes.map((inf, i) => `
  <div class="informe-card" onclick="openModal(${i})">
    <div class="informe-card-ref">${inf.ref}</div>
    <div class="informe-card-id">${inf.id}</div>
    <div class="informe-card-sub">${inf.genere} · ${inf.data}</div>
    <div class="informe-card-excerpt">${inf.informe}</div>
    <span class="informe-card-arrow">↗</span>
  </div>`).join('') + `
  <div class="informe-card" style="background:#0d0d0d;cursor:default;">
    <div class="informe-card-ref" style="color:#333">PENDENT</div>
    <div class="informe-card-id" style="color:#222">—</div>
    <div class="informe-card-sub">Sistema en espera</div>
    <div class="informe-card-excerpt" style="color:#333">El sistema continua processant. Cada visitant genera el seu propi informe.</div>
  </div>`;

document.getElementById('obra').innerHTML = `
  <div class="section-label">${C.obra.label}</div>
  <p class="obra-intro">${C.obra.intro}</p>
  <div class="informes-header">
    <div>Referència</div><div>Subjecte</div><div>Durada obs.</div><div>Estat</div>
  </div>
  <div class="informes-grid">${informesHTML}</div>`;

/* ── MODALS ── */
document.getElementById('modals').innerHTML = C.obra.informes.map((inf, i) => `
  <div class="modal-overlay" id="modal-${i}" onclick="closeModal(event,${i})">
    <div class="modal-box">
      <button class="modal-close" onclick="document.getElementById('modal-${i}').classList.remove('open')">✕</button>
      <div class="modal-ref">${inf.ref} · REGISTRE DE SEGUIMENT I ANÀLISI CONDUCTUAL</div>
      <div class="modal-meta">UBICACIÓ: ${inf.ubicacio}</div>
      <div class="modal-meta">CRONOLOGIA: ${inf.data} · TEMPS OBS. ${inf.temps}</div>
      <div class="modal-title">${inf.id}</div>
      <div class="modal-subtitle">${inf.genere} · ${inf.descripcio}</div>
      ${inf.imatge ? `<img src="${inf.imatge}" class="modal-imatge" alt="Imatge ${inf.id}" onerror="this.style.display='none'">` : ''}
      <div class="modal-body">
        <strong>Informe conductual</strong>
        ${inf.informe}
      </div>
    </div>
  </div>`).join('');

/* ── REFERENTS ── */
document.getElementById('referents').innerHTML = `
  <div class="section-label">${C.referents.label}</div>
  <div class="referents-list">
    ${C.referents.llista.map(r => `
      <div class="referent-item">
        <div class="referent-num">${r.num}</div>
        <div>
          <div class="referent-name">${r.nom}</div>
          <div class="referent-work">${r.obra}</div>
        </div>
        <div class="referent-desc">${r.desc}</div>
      </div>`).join('')}
  </div>`;

/* ── CONCLUSIONS ── */
const concl = document.getElementById('conclusions');
if (C.imatges.conclusionsFons) {
  concl.classList.add('amb-fons');
  concl.style.backgroundImage = `url('${C.imatges.conclusionsFons}')`;
}
concl.innerHTML = `
  <div class="section-label">${C.conclusions.label}</div>
  <div class="conclusions-body">
    <p>${C.conclusions.p1}</p>
    <p>${C.conclusions.p2}</p>
    <p>${C.conclusions.p3}</p>
    <em>${C.conclusions.ref}</em>
  </div>`;

/* ── FOOTER ── */
document.getElementById('footer').innerHTML = `
  <p>${C.footer.esquerra}</p>
  <p>${C.footer.dreta}</p>`;

/* ── INTERACCIONS ── */
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
});

const revealObs = new IntersectionObserver(
  es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
  { threshold: 0.1 }
);
const activeObs = new IntersectionObserver(es => {
  es.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.process-step-link').forEach(l => l.classList.remove('active'));
      const a = document.querySelector(`.process-step-link[href="#${e.target.id}"]`);
      if (a) a.classList.add('active');
    }
  });
}, { threshold: 0.5 });

document.querySelectorAll('.process-entry').forEach(el => {
  revealObs.observe(el);
  if (el.id) activeObs.observe(el);
});

function openModal(i) {
  document.getElementById(`modal-${i}`).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e, i) {
  if (e.target === e.currentTarget) {
    document.getElementById(`modal-${i}`).classList.remove('open');
    document.body.style.overflow = '';
  }
}
</script>
</body>
</html>
