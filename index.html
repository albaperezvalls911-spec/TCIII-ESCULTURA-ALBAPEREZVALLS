<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'ALTERITAT DEL JO, sota la mirada — Memòria Artística</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --black: #000000;
    --white: #f0ece4;
    --grey-main: #666666; /* Gris per a detalls i línies */
    --grey-light: #cccccc; /* Gris per a text sobre fosc */
    --header-bg: #222222; /* Gris fosc per a la barra de dalt */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--white);
    color: var(--black);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    cursor: crosshair;
  }

  /* NOISE & SCANLINE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  /* HEADER (Barra de dalt gris fosc) */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2rem;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    background: var(--header-bg);
    backdrop-filter: blur(8px);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    color: var(--grey-light);
    text-decoration: none;
  }

  .logo span { color: var(--grey-main); }

  nav { display: flex; gap: 1.5rem; align-items: center; }

  nav a {
    color: #999;
    text-decoration: none;
    font-size: 0.72rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    transition: color 0.2s;
  }

  nav a:hover { color: var(--white); }

  #timer-badge {
    font-size: 0.65rem;
    color: var(--grey-main);
    border: 1px solid var(--grey-main);
    padding: 0.25rem 0.6rem;
  }

  /* HERO & EYE (Ull gris) */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 2rem 4rem;
    position: relative;
    overflow: hidden;
  }

  .eye-container {
    position: absolute;
    top: 50%; right: 6%;
    transform: translateY(-50%);
    width: min(38vw, 380px);
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .eye-svg { width: 100%; height: 100%; animation: eye-rotate 20s linear infinite; }

  @keyframes eye-rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    position: absolute;
    width: 38%; height: 38%;
    border-radius: 50%;
