  .panoptic-quote p { font-family: var(--mono); font-style: italic; font-size: 13px; color: var(--grey); letter-spacing: 0.08em; line-height: 2; max-width: 700px; margin: 0 auto 12px; }
  .panoptic-quote cite { font-size: 10px; color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; }

  .process-steps { display: grid; grid-template-columns: 1fr 2fr; gap: 80px; margin-top: 20px; }
  .process-nav { position: sticky; top: 120px; height: fit-content; }
  .process-step-link { display: block; font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; color: var(--grey); text-decoration: none; padding: 10px 0; border-bottom: 1px solid var(--light-grey); transition: color 0.2s, padding-left 0.2s; }
  .process-step-link:hover, .process-step-link.active { color: var(--black); padding-left: 12px; }
  .process-entries { display: flex; flex-direction: column; gap: 60px; }
  .process-entry { opacity: 0; transform: translateY(20px); transition: opacity 0.6s, transform 0.6s; }
  .process-entry.visible { opacity: 1; transform: translateY(0); }
  .process-entry-header { display: flex; align-items: baseline; gap: 20px; margin-bottom: 20px; }
  .process-entry-num { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: 0.15em; }
  .process-entry-title { font-family: var(--sans); font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
  .process-entry-body { font-size: 14px; line-height: 1.85; color: #333; max-width: 560px; }
  .process-entry-body p + p { margin-top: 16px; }

  .screenshots-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-top: 40px; }
  .screenshot-item { position: relative; overflow: hidden; background: #111; aspect-ratio: 16/10; }
  .screenshot-item img { width: 100%; height: 100%; object-fit: cover; display: block; filter: grayscale(30%); transition: filter 0.4s, transform 0.4s; }
  .screenshot-item:hover img { filter: grayscale(0%); transform: scale(1.03); }
  .screenshot-label { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.7)); padding: 20px 16px 12px; font-family: var(--mono); font-size: 9px; color: rgba(255,255,255,0.6); letter-spacing: 0.12em; text-transform: uppercase; }

  .obra-section { background: #0a0a0a; color: var(--white); padding: 100px 40px; }
  .obra-section .section-label { color: var(--accent); }
  .obra-section .section-label::after { background: #333; }
  .obra-intro { max-width: 640px; font-size: 16px; line-height: 1.8; color: #bbb; margin-bottom: 80px; }
  .informes-header { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; margin-bottom: 1px; }
  .informes-header div { font-family: var(--mono); font-size: 9px; color: var(--grey); letter-spacing: 0.15em; text-transform: uppercase; padding: 8px 16px; background: #111; }
  .informes-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; }
  .informe-card { background: #111; padding: 28px 24px; cursor: pointer; transition: background 0.25s; position: relative; overflow: hidden; }
  .informe-card:hover { background: #1c1c1c; }
  .informe-card-ref { font-family: var(--mono); font-size: 9px; color: var(--accent); letter-spacing: 0.15em; margin-bottom: 12px; }
  .informe-card-id { font-family: var(--sans); font-size: 28px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 8px; line-height: 1; }
  .informe-card-sub { font-family: var(--mono); font-size: 9px; color: var(--grey); margin-bottom: 16px; letter-spacing: 0.05em; }
  .informe-card-excerpt { font-size: 11px; color: #666; line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .informe-card-arrow { position: absolute; bottom: 20px; right: 20px; font-size: 18px; color: #333; transition: color 0.2s, transform 0.2s; }
  .informe-card:hover .informe-card-arrow { color: var(--accent); transform: translate(3px, -3px); }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 1000; align-items: center; justify-content: center; padding: 40px; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #0f0f0f; border: 1px solid #222; max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; position: relative; padding: 48px; animation: fadeIn 0.25s ease; }
  .modal-close { position: sticky; top: 0; float: right; background: none; border: none; color: var(--grey); font-size: 22px; cursor: pointer; font-family: var(--mono); margin-bottom: 20px; transition: color 0.2s; }
  .modal-close:hover { color: var(--white); }
  .modal-ref { font-family: var(--mono); font-size: 9px; color: var(--accent); letter-spacing: 0.2em; margin-bottom: 6px; }
  .modal-meta { font-family: var(--mono); font-size: 9px; color: var(--grey); letter-spacing: 0.12em; margin-bottom: 4px; }
  .modal-title { font-family: var(--sans); font-size: 32px; font-weight: 700; letter-spacing: -0.02em; color: var(--white); margin-bottom: 6px; margin-top: 20px; line-height: 1; }
  .modal-subtitle { font-family: var(--mono); font-size: 10px; color: #555; margin-bottom: 32px; letter-spacing: 0.08em; }
  .modal-body { font-size: 13px; line-height: 1.9; color: #aaa; border-top: 1px solid #1f1f1f; padding-top: 28px; }
  .modal-body strong { display: block; font-family: var(--mono); font-size: 9px; color: var(--grey); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 12px; margin-top: 24px; font-weight: normal; }

  .referents-list { margin-top: 20px; }
  .referent-item { border-top: 1px solid var(--light-grey); padding: 28px 0; display: grid; grid-template-columns: 80px 1fr 1fr; gap: 40px; align-items: start; cursor: default; transition: padding-left 0.2s; }
  .referent-item:hover { padding-left: 16px; }
  .referent-item:last-child { border-bottom: 1px solid var(--light-grey); }
  .referent-num { font-family: var(--mono); font-size: 10px; color: var(--grey); letter-spacing: 0.12em; }
  .referent-name { font-family: var(--sans); font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .referent-work { font-family: var(--mono); font-size: 11px; color: var(--grey); letter-spacing: 0.06em; }
  .referent-desc { font-size: 13px; color: #555; line-height: 1.7; }

  .conclusions-section { background: var(--white); border-top: 1px solid var(--light-grey); }
  .conclusions-body { max-width: 680px; margin: 0 auto; text-align: center; }
  .conclusions-body p { font-family: var(--sans); font-size: 20px; font-weight: 700; line-height: 1.6; letter-spacing: -0.01em; margin-bottom: 24px; }
  .conclusions-body em { font-family: var(--mono); font-style: normal; font-size: 12px; color: var(--grey); letter-spacing: 0.1em; display: block; margin-top: 40px; }

  footer { border-top: 1px solid var(--light-grey); padding: 24px 40px; display: flex; justify-content: space-between; align-items: center; background: var(--white); }
  footer p { font-family: var(--mono); font-size: 10px; color: var(--grey); letter-spacing: 0.1em; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  .modal-box::-webkit-scrollbar { width: 4px; }
  .modal-box::-webkit-scrollbar-track { background: #111; }
  .modal-box::-webkit-scrollbar-thumb { background: #333; }
</style>
</head>
<body>

<!-- Estructura HTML mínima — el contingut es genera automàticament -->
<nav id="nav"></nav>
<section class="hero" id="hero">
  <div class="hero-content"></div>
  <div class="hero-bottom"></div>
</section>
<div class="ticker"><div class="ticker-inner" id="ticker-inner"></div></div>
<section id="intro"></section>
<section id="marc" class="theory-section"></section>
<section id="proces"></section>
<section id="obra" class="obra-section"></section>
<section id="referents" class="referents-section"></section>
<section id="conclusions" class="conclusions-section"></section>
<footer id="footer"></footer>
<div id="modals-container"></div>

<!-- ============================================================
  RENDER — no cal editar
============================================================ -->
<script>
const C = CONTINGUT;

// NAV
document.getElementById('nav').innerHTML = `
  <span class="nav-id">${C.nav.id}</span>
  <ul class="nav-links">
    ${C.nav.links.map(l => `<li><a href="${l.href}">${l.text}</a></li>`).join('')}
  </ul>`;

// HERO
document.querySelector('.hero-content').innerHTML = `
  <div class="hero-ref">${C.hero.ref}</div>
  <h1 class="hero-title">
    ${C.hero.titol.replace(/\n/g, '<br>')}
    <em>${C.hero.subtitol}</em>
  </h1>
  <p class="hero-abstract">${C.hero.abstract}</p>`;
document.querySelector('.hero-bottom').innerHTML = `
  <div class="hero-keywords">
    ${C.hero.keywords.map(k => `<span>${k}</span>`).join('')}
  </div>
  <div class="scroll-hint">${C.hero.scrollHint}</div>`;

// TICKER
const tickerItems = C.ticker.map(t =>
  `<span class="${t.accent ? 'accent' : ''}">${t.text}</span>`).join('');
const tickerEl = document.getElementById('ticker-inner');
tickerEl.innerHTML = tickerItems + tickerItems;

// INTRO
document.getElementById('intro').innerHTML = `
  <div class="section-label">${C.intro.label}</div>
  <div class="intro-grid">
    <div><h2 class="intro-heading">${C.intro.titol}</h2></div>
    <div class="intro-text">
      <p>${C.intro.p1}</p>
      <blockquote>${C.intro.cita}</blockquote>
      <p>${C.intro.p2}</p>
    </div>
  </div>`;

// MARC TEÒRIC
document.getElementById('marc').innerHTML = `
  <div class="section-label">${C.marc.label}</div>
  <div class="theory-grid">
    ${C.marc.conceptes.map(con => `
      <div class="theory-card">
        <div class="theory-card-num">${con.num}</div>
        <div class="theory-card-title">${con.titol}</div>
        <div class="theory-card-author">${con.autor}</div>
        <div class="theory-card-text">${con.text}</div>
      </div>`).join('')}
  </div>
  <div class="panoptic-quote">
    <p>${C.marc.cita}</p>
    <cite>${C.marc.citaAutor}</cite>
  </div>`;

// PROCÉS
const navLinks = C.proces.passos.map((p, i) =>
  `<a href="#${p.id}" class="process-step-link${i === 0 ? ' active' : ''}">${p.num} · ${p.titol}</a>`
).join('');

const entries = C.proces.passos.map(p => {
  const entry = `
    <div class="process-entry" id="${p.id}">
      <div class="process-entry-header">
        <span class="process-entry-num">${p.num}</span>
        <h3 class="process-entry-title">${p.titol}</h3>
      </div>
      <div class="process-entry-body">
        <p>${p.p1}</p>
        ${p.p2 ? `<p>${p.p2}</p>` : ''}
      </div>
    </div>`;
  if (p.id === 'step2') {
    const caps = `
      <div class="screenshots-grid">
        ${C.proces.captures.map(c => `
          <div class="screenshot-item">
            <img src="${c.src}" alt="${c.label}"
              onerror="this.parentElement.style.background='#1a1a1a';this.style.display='none'">
            <div class="screenshot-label">${c.label}</div>
          </div>`).join('')}
      </div>`;
    return entry + caps;
  }
  return entry;
}).join('');

document.getElementById('proces').innerHTML = `
  <div class="section-label">${C.proces.label}</div>
  <div class="process-steps">
    <nav class="process-nav">${navLinks}</nav>
    <div class="process-entries">${entries}</div>
  </div>`;

// OBRA FINAL
const informesHTML = C.obra.informes.map((inf, i) => `
  <div class="informe-card" onclick="openModal(${i})">
    <div class="informe-card-ref">${inf.ref}</div>
    <div class="informe-card-id">${inf.id}</div>
    <div class="informe-card-sub">${inf.genere} · ${inf.data}</div>
    <div class="informe-card-excerpt">${inf.informe}</div>
    <span class="informe-card-arrow">↗</span>
  </div>`).join('') + `
  <div class="informe-card" style="background:#0d0d0d;cursor:default;">
    <div class="informe-card-ref" style="color:#333">PENDENT</div>
    <div class="informe-card-id" style="color:#222">—</div>
    <div class="informe-card-sub">Sistema en espera</div>
    <div class="informe-card-excerpt" style="color:#333">El sistema continua processant. Cada visitant genera el seu propi informe.</div>
  </div>`;

document.getElementById('obra').innerHTML = `
  <div class="section-label">${C.obra.label}</div>
  <p class="obra-intro">${C.obra.intro}</p>
  <div class="informes-header">
    <div>Referència</div><div>Subjecte</div><div>Durada obs.</div><div>Estat</div>
  </div>
  <div class="informes-grid">${informesHTML}</div>`;

// MODALS
document.getElementById('modals-container').innerHTML = C.obra.informes.map((inf, i) => `
  <div class="modal-overlay" id="modal-${i}" onclick="closeModal(event,${i})">
    <div class="modal-box">
      <button class="modal-close"
        onclick="document.getElementById('modal-${i}').classList.remove('open')">✕</button>
      <div class="modal-ref">${inf.ref} · REGISTRE DE SEGUIMENT I ANÀLISI CONDUCTUAL</div>
      <div class="modal-meta">UBICACIÓ: ${inf.ubicacio}</div>
      <div class="modal-meta">CRONOLOGIA: ${inf.data} · TEMPS OBS. ${inf.temps}</div>
      <div class="modal-title">${inf.id}</div>
      <div class="modal-subtitle">${inf.genere} · ${inf.descripcio}</div>
      <div class="modal-body">
        <strong>Informe conductual</strong>
        ${inf.informe}
      </div>
    </div>
  </div>`).join('');

// REFERENTS
document.getElementById('referents').innerHTML = `
  <div class="section-label">${C.referents.label}</div>
  <div class="referents-list">
    ${C.referents.llista.map(r => `
      <div class="referent-item">
        <div class="referent-num">${r.num}</div>
        <div>
          <div class="referent-name">${r.nom}</div>
          <div class="referent-work">${r.obra}</div>
        </div>
        <div class="referent-desc">${r.desc}</div>
      </div>`).join('')}
  </div>`;

// CONCLUSIONS
document.getElementById('conclusions').innerHTML = `
  <div class="section-label">${C.conclusions.label}</div>
  <div class="conclusions-body">
    <p>${C.conclusions.p1}</p>
    <p>${C.conclusions.p2}</p>
    <p>${C.conclusions.p3}</p>
    <em>${C.conclusions.ref}</em>
  </div>`;

// FOOTER
document.getElementById('footer').innerHTML = `
  <p>${C.footer.esquerra}</p>
  <p>${C.footer.dreta}</p>`;

// INTERACCIONS
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
});

const observer = new IntersectionObserver(
  entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }),
  { threshold: 0.1 }
);
document.querySelectorAll('.process-entry').forEach(el => observer.observe(el));

const processObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      document.querySelectorAll('.process-step-link').forEach(l => l.classList.remove('active'));
      const a = document.querySelector(`.process-step-link[href="#${e.target.id}"]`);
      if (a) a.classList.add('active');
    }
  });
}, { threshold: 0.5 });
document.querySelectorAll('.process-entry[id]').forEach(el => processObs.observe(el));

function openModal(i) {
  document.getElementById(`modal-${i}`).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e, i) {
  if (e.target === e.currentTarget) {
    document.getElementById(`modal-${i}`).classList.remove('open');
    document.body.style.overflow = '';
  }
}
</script>
</body>
</html>
