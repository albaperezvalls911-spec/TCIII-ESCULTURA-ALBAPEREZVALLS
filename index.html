<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'ALTERITAT DEL JO, sota la mirada — Memòria Artística</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:ital,wght@0,300;0,400;1,300&family=Playfair+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --black: #0a0a0a;
    --white: #f0ece4;
    --red: #888; /* CANVIAT A GRIS (abans vermell) */
    --grey: #666;
    --light-grey: #2a2a2a;
    --header-bg: #333; /* NOU: Color gris per a la barra de dalt */
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--white);
    color: var(--black); /* TEXT EN NEGRE */
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    cursor: crosshair;
  }

  /* HEADER */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2rem;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    background: var(--header-bg); /* BARRA DE DALT GRIS */
    backdrop-filter: blur(8px);
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 0.1em;
    color: #ccc; /* TÍTOL GRIS LLUMINÓS */
    text-decoration: none;
  }

  .logo span { color: var(--red); } /* EL punt de l'OLL ara és gris */

  /* TEXT DEL COS EN NEGRE */
  p {
    color: var(--black); 
    margin-bottom: 1.2rem;
    font-size: 0.85rem;
  }

  /* L'ULL (ELEMENTS GRÀFICS) */
  .eye-center {
    position: absolute;
    width: 38%;
    height: 38%;
    border-radius: 50%;
    background: #777; /* ULL GRIS */
    animation: pulse 3s ease-in-out infinite;
  }

  .eye-svg circle[stroke*="rgba(192,57,43"] {
    stroke: rgba(120, 120, 120, 0.4); /* Cercles de l'ull en gris */
  }

  .eye-svg g[stroke*="rgba(192,57,43"] {
    stroke: rgba(100, 100, 100, 0.6); /* Crosshair en gris */
  }

  /* TÍTOL PRINCIPAL (HERO) */
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(4rem, 10vw, 9rem);
    line-height: 0.9;
    letter-spacing: -0.01em;
    margin-bottom: 1.5rem;
    color: #444; /* Títol sota en gris fosc */
  }

  h1 .line2 {
    display: block;
    -webkit-text-stroke: 1px #444;
    color: transparent;
  }

  /* INDICADOR DE SECCIÓ I ALTRES DETALLS */
  .section
